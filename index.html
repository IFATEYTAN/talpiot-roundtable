<style>
  /* ===========================================================
     TALPIOT · v3 · Heritage Private Banking
     Cream + Forest + Antique Brass + Wine accent
     Frank Ruhl Libre · Heebo
     =========================================================== */
  :root {
    /* === 2-color system: Forest Green + Gold, on White/Cream === */
    --paper: #FBFAF6;          /* near-white cream */
    --paper-warm: #F4F1E8;     /* soft cream for alt sections */
    --paper-cool: #FFFFFF;     /* pure white cards */
    --forest: #16352A;         /* deep forest green — primary */
    --forest-deep: #0D2118;    /* darkest green */

    /* Ink + lines */
    --ink: #16352A;            /* text uses forest green, not black */
    --ink-soft: #3A4F45;       /* softer green-gray for body */
    --ink-mute: #6E7B72;       /* muted green-gray */
    --line: rgba(22, 53, 42, 0.12);
    --line-soft: rgba(22, 53, 42, 0.06);
    --line-strong: rgba(22, 53, 42, 0.25);

    /* Gold — the single accent */
    --gold: #C2A24C;           /* refined gold */
    --gold-bright: #D9BD6E;    /* lighter gold for dark bg */
    --gold-deep: #9A7E33;      /* darker gold for light bg text */
    --gold-tint: rgba(194, 162, 76, 0.10);

    /* Aliases kept so existing rules still resolve to the 2-color system */
    --night: #16352A;
    --night-warm: #0D2118;
    --brass: #C2A24C;
    --brass-bright: #D9BD6E;
    --brass-deep: #9A7E33;
    --brass-tint: rgba(194, 162, 76, 0.10);
    --wine: #9A7E33;           /* was bordeaux -> now gold-deep */
    --wine-soft: #C2A24C;

    /* Type */
    --serif: 'Arimo', 'Arial', Tahoma, sans-serif;
    --sans: 'Arimo', 'Arial', Tahoma, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 400;
    line-height: 1.75;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Layered atmosphere */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background:
      radial-gradient(ellipse 60% 50% at 15% 0%, rgba(168, 120, 63, 0.08), transparent 70%),
      radial-gradient(ellipse 60% 50% at 85% 100%, rgba(27, 51, 40, 0.06), transparent 70%);
  }
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.65 0 0 0 0 0.45 0 0 0 0 0.22 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.6;
    mix-blend-mode: multiply;
  }
  main, header, footer, section { position: relative; z-index: 3; }

  /* ============ Layout ============ */
  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 44px; }
  .narrow { max-width: 900px; margin: 0 auto; padding: 0 44px; }
  @media (max-width: 720px) {
    .wrap, .narrow { padding: 0 24px; }
  }

  /* ============ Top nav ============ */
  .nav {
    position: sticky; top: 0; z-index: 100;
    padding: 16px 0;
    background: rgba(250, 245, 232, 0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: center;
  }
  .nav-logo img { height: 48px; width: auto; display: block; }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 28px;
    background: var(--forest); color: var(--paper);
    text-decoration: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: 1px solid var(--forest);
    border-radius: 2px;
    transition: all 0.35s cubic-bezier(.2,.7,.3,1);
  }
  .nav-cta:hover {
    background: var(--brass); border-color: var(--brass); color: var(--night);
  }
  .nav-cta svg { width: 14px; height: 14px; }

  /* ============ HERO ============ */
  .hero {
    min-height: 94vh;
    padding: 90px 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center;
    position: relative; overflow: hidden;
  }
  @media (max-width: 720px) {
    .hero { min-height: auto; padding: 64px 0 72px; }
  }

  /* Decorative archway behind hero */
  .hero-arch {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 800px;
    border: 1px solid var(--brass);
    border-radius: 50%;
    opacity: 0.08;
    z-index: 0;
  }
  .hero-arch::before {
    content: '';
    position: absolute; inset: 60px;
    border: 1px solid var(--brass);
    border-radius: 50%;
  }
  @media (max-width: 900px) {
    .hero-arch { width: 600px; height: 600px; }
    .hero-arch::before { inset: 40px; }
  }

  .hero-inner {
    position: relative; z-index: 2;
    max-width: 1000px;
    padding: 0 20px;
  }

  .hero-mark { margin-bottom: 44px; }
  .hero-mark img {
    height: 100px; width: auto;
    display: block; margin: 0 auto;
    filter: drop-shadow(0 8px 28px rgba(15, 20, 25, 0.10));
  }
  @media (max-width: 720px) { .hero-mark img { height: 78px; } }

  .hero-rule {
    display: flex; align-items: center; justify-content: center;
    gap: 22px;
    margin-bottom: 38px;
  }
  .hero-rule::before, .hero-rule::after {
    content: ''; height: 1px; width: 56px; background: var(--brass);
  }
  .hero-rule span {
    font-family: var(--sans);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.46em;
    color: var(--brass-deep);
    text-transform: uppercase;
  }

  .hero-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: clamp(44px, 7.6vw, 100px);
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 24px;
  }
  .hero-title .ornament {
    display: inline-block;
    color: var(--brass);
    font-weight: 300;
    margin: 0 0.15em;
    transform: translateY(-0.05em);
  }
  .hero-title .line2 {
    display: block;
    margin-top: 14px;
    font-size: 0.58em;
    font-weight: 400;
    color: var(--ink-soft);
    letter-spacing: -0.02em;
  }
  .hero-title .accent {
    color: var(--wine);
    font-style: normal;
    font-weight: 500;
  }

  .hero-tagline {
    font-family: var(--serif);
    font-weight: 300;
    font-style: normal;
    font-size: clamp(18px, 2.2vw, 24px);
    color: var(--ink-soft);
    margin-top: 30px;
    line-height: 1.55;
  }

  /* Heritage band */
  .hero-band {
    margin: 50px auto 0;
    max-width: 760px;
    padding: 22px 44px;
    border-top: 2px solid var(--brass);
    border-bottom: 2px solid var(--brass);
    background: linear-gradient(180deg, var(--brass-tint), rgba(194,162,76,0.16), var(--brass-tint));
    font-family: var(--serif);
    font-size: 18.5px;
    font-weight: 600;
    color: var(--brass-deep);
    letter-spacing: 0.01em;
    border-radius: 4px;
  }
  .hero-band strong { font-weight: 800; color: var(--brass-deep); }

  .hero-meta {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 32px;
    margin-top: 44px;
    font-size: 15px;
    color: var(--ink-soft);
  }
  .hero-meta span {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 500;
  }
  .hero-meta svg { width: 16px; height: 16px; color: var(--brass-deep); }

  .hero-cta {
    margin-top: 52px;
    display: inline-flex; align-items: center; gap: 14px;
    padding: 19px 48px;
    background: var(--forest);
    color: var(--paper);
    text-decoration: none;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border-radius: 2px;
    border: 1px solid var(--forest);
    transition: all 0.4s cubic-bezier(.2,.7,.3,1);
    position: relative; overflow: hidden;
  }
  .hero-cta::after {
    content: ''; position: absolute; inset: 0;
    background: var(--brass);
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(.2,.7,.3,1);
    z-index: -1;
  }
  .hero-cta:hover { border-color: var(--brass); color: var(--night); }
  .hero-cta:hover::after { transform: translateX(0); }
  .hero-cta svg { width: 16px; height: 16px; }

  /* ============ LEDE ============ */
  .lede {
    padding: 96px 0 84px;
    text-align: center;
    background:
      linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 50%, var(--paper) 100%);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  @media (max-width: 720px) { .lede { padding: 80px 0 70px; } }

  .lede h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(32px, 5vw, 56px);
    line-height: 1.18;
    color: var(--ink);
    max-width: 820px;
    margin: 0 auto 36px;
    letter-spacing: -0.025em;
  }
  .lede h2 em {
    color: var(--wine);
    font-style: normal;
    font-weight: 500;
  }
  .lede p {
    font-size: 17.5px;
    line-height: 1.85;
    color: var(--ink-soft);
    max-width: 720px;
    margin: 0 auto;
    font-weight: 400;
  }
  .lede p strong { color: var(--ink); font-weight: 700; }
  .lede p + p { margin-top: 22px; }
  .lede .lede-emph {
    margin-top: 30px;
    padding-top: 26px;
    border-top: 1px solid var(--line);
    font-size: 18.5px;
    color: var(--ink);
  }
  .lede .lede-emph strong { color: var(--forest); }

  /* ============ STATEMENT ============ */
  .statement {
    background: var(--forest);
    color: var(--paper);
    padding: 112px 0;
    text-align: center;
    position: relative; overflow: hidden;
  }
  @media (max-width: 720px) { .statement { padding: 90px 0; } }

  .statement::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 25% 15%, rgba(168, 120, 63, 0.20), transparent 60%),
      radial-gradient(ellipse at 75% 85%, rgba(168, 120, 63, 0.10), transparent 60%);
    pointer-events: none;
  }

  .statement-mark {
    font-family: var(--serif);
    font-size: 96px;
    line-height: 1;
    color: var(--brass-bright);
    margin-bottom: 16px;
    font-weight: 300;
    opacity: 0.7;
  }

  .statement-quote {
    position: relative;
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(30px, 5.2vw, 62px);
    line-height: 1.22;
    letter-spacing: -0.02em;
    max-width: 920px;
    margin: 0 auto;
    color: var(--paper);
  }
  .statement-quote em {
    font-style: normal;
    color: var(--brass-bright);
    font-weight: 400;
  }

  .statement-attribution {
    margin-top: 40px;
    font-size: 12px;
    letter-spacing: 0.46em;
    text-transform: uppercase;
    color: var(--brass-bright);
    font-weight: 700;
  }

  /* ============ Section title ============ */
  .sect-title {
    text-align: center;
    margin-bottom: 64px;
  }
  .sect-title h2 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: clamp(34px, 5.5vw, 64px);
    line-height: 1.08;
    color: var(--ink);
    letter-spacing: -0.03em;
  }
  .sect-title h2 em { color: var(--wine); font-style: normal; font-weight: 500; }
  .sect-title .kicker {
    display: block;
    margin-top: 20px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.30em;
    color: var(--brass-deep);
    text-transform: uppercase;
  }
  .sect-title .sect-sub {
    max-width: 680px;
    margin: 22px auto 0;
    font-family: var(--sans);
    font-size: 16.5px;
    line-height: 1.7;
    color: var(--ink-soft, rgba(22,53,42,0.78));
  }
  @media (max-width: 720px) { .sect-title { margin-bottom: 56px; } .sect-title .sect-sub { font-size: 15px; } }

  /* ============ TOPICS — giant numerals ============ */
  .topics { padding: 104px 0 92px; }
  @media (max-width: 720px) { .topics { padding: 90px 0 70px; } }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 56px 64px;
  }
  @media (max-width: 820px) {
    .topics-grid { grid-template-columns: 1fr; gap: 48px; }
  }

  .topic {
    position: relative;
    padding-right: 110px;
    min-height: 140px;
  }
  @media (max-width: 520px) {
    .topic { padding-right: 80px; min-height: 120px; }
  }

  /* Giant Roman numeral */
  .topic-num {
    position: absolute;
    top: -10px; right: 0;
    font-family: var(--serif);
    font-weight: 300;
    font-size: 88px;
    line-height: 0.9;
    color: var(--brass);
    opacity: 0.85;
    letter-spacing: -0.05em;
    user-select: none;
  }
  @media (max-width: 520px) {
    .topic-num { font-size: 64px; top: -6px; }
  }

  .topic-cat {
    display: block;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.30em;
    color: var(--brass-deep);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .topic-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 22px;
    line-height: 1.32;
    color: var(--ink);
    margin-bottom: 14px;
    letter-spacing: -0.012em;
  }

  .topic-desc {
    font-size: 15.5px;
    line-height: 1.75;
    color: var(--ink-soft);
    font-weight: 400;
  }

  /* ============ Speakers ============ */
  .speakers {
    padding: 104px 0;
    background: var(--paper-warm);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  @media (max-width: 720px) { .speakers { padding: 90px 0; } }

  .speakers-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 64px 44px;
  }
  @media (max-width: 900px) {
    .speakers-grid { grid-template-columns: repeat(2, 1fr); gap: 48px 32px; }
  }
  @media (max-width: 520px) {
    .speakers-grid { grid-template-columns: 1fr; gap: 44px; }
  }

  .speaker { text-align: center; }

  .speaker-photo {
    position: relative;
    aspect-ratio: 1;
    max-width: 240px;
    margin: 0 auto 28px;
    overflow: hidden;
    border-radius: 50%;
    background: var(--paper);
    isolation: isolate;
  }
  .speaker-photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(100%) contrast(1.06) brightness(0.96) sepia(0.08);
    transition: filter 0.7s cubic-bezier(.2,.7,.3,1), transform 0.9s cubic-bezier(.2,.7,.3,1);
  }
  .speaker-photo::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    box-shadow: inset 0 0 0 1px rgba(15, 20, 25, 0.12), 0 6px 24px rgba(15, 20, 25, 0.05);
    pointer-events: none;
  }
  .speaker:hover .speaker-photo img {
    filter: grayscale(0%);
    transform: scale(1.05);
  }

  .speaker-tag {
    display: block;
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.30em;
    color: var(--brass-deep);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .speaker-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 21px;
    color: var(--ink);
    margin-bottom: 8px;
    letter-spacing: -0.005em;
    line-height: 1.3;
  }

  .speaker-role {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 260px;
    margin: 0 auto;
    font-weight: 400;
  }

  /* ============ Guest Lecture (Bonus) ============ */
  .guest {
    padding: 100px 0;
    background: var(--forest);
    color: var(--paper);
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 720px) { .guest { padding: 80px 0; } }
  .guest::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(201,158,94,0.18), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,158,94,0.10), transparent 60%);
    pointer-events: none;
  }
  .guest-inner {
    position: relative; z-index: 2;
    max-width: 1100px; margin: 0 auto; padding: 0 44px;
    display: grid; grid-template-columns: 320px 1fr; gap: 60px;
    align-items: center;
  }
  @media (max-width: 820px) {
    .guest-inner { grid-template-columns: 1fr; gap: 40px; text-align: center; padding: 0 28px; }
  }
  .guest-photo {
    position: relative; width: 320px; height: 320px; margin: 0 auto;
    border-radius: 50%; overflow: hidden;
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    isolation: isolate;
  }
  @media (max-width: 820px) { .guest-photo { width: 240px; height: 240px; } }
  .guest-photo img { width: 100%; height: 100%; object-fit: cover; }
  .guest-photo::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    box-shadow: inset 0 0 0 2px var(--gold-bright);
  }
  .guest-label {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.30em;
    color: var(--gold-bright); text-transform: uppercase; margin-bottom: 22px;
  }
  .guest-label::before {
    content: ''; width: 34px; height: 1px; background: var(--gold-bright);
  }
  @media (max-width: 820px) { .guest-label { justify-content: center; } .guest-label::before { display:none; } }
  .guest-lecture-title {
    font-family: var(--serif); font-weight: 700;
    font-size: clamp(26px, 3.6vw, 40px); line-height: 1.2;
    color: var(--paper); letter-spacing: -0.02em; margin-bottom: 26px;
  }
  .guest-lecture-title .q { color: var(--gold-bright); }
  .guest-name {
    font-family: var(--serif); font-weight: 700; font-size: 24px;
    color: var(--gold-bright); margin-bottom: 8px;
  }
  .guest-role { font-size: 15.5px; color: rgba(250,245,232,0.82); line-height: 1.6; }

  /* ============ Practical ============ */
  .practical { padding: 104px 0; }
  @media (max-width: 720px) { .practical { padding: 90px 0; } }

  .practical-grid {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 60px;
  }
  @media (max-width: 820px) {
    .practical-grid { grid-template-columns: 1fr; gap: 40px; }
  }

  .card {
    background: var(--paper-cool);
    border: 1px solid var(--line);
    padding: 52px 48px;
    position: relative;
  }
  @media (max-width: 720px) {
    .card { padding: 38px 28px; }
  }
  .card::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 80px; height: 2px;
    background: var(--brass);
  }

  .card-label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    color: var(--brass-deep);
    letter-spacing: 0.36em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.18;
    letter-spacing: -0.02em;
    margin-bottom: 36px;
  }

  /* Schedule rows — proper spacing */
  .sched-row {
    display: grid;
    grid-template-columns: 92px 1fr;
    gap: 24px;
    padding: 22px 0;
    border-top: 1px dashed var(--line);
    align-items: start;
  }
  .sched-row:first-of-type { border-top: 1px solid var(--line); }
  .sched-row:last-of-type { border-bottom: 1px solid var(--line); }

  .sched-time {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    color: var(--brass-deep);
    line-height: 1.2;
  }

  .sched-text {
    font-size: 15.5px;
    color: var(--ink);
    line-height: 1.55;
  }
  .sched-text strong {
    display: block;
    font-weight: 700;
    margin-bottom: 6px;
    font-size: 16px;
  }
  .sched-text .muted {
    display: block;
    color: var(--ink-mute);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Location rows — proper spacing */
  .loc-row {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    padding: 20px 0;
    border-top: 1px dashed var(--line);
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .loc-row:first-of-type { border-top: 1px solid var(--line); }
  .loc-row:last-of-type { border-bottom: 1px solid var(--line); }
  .loc-row svg {
    width: 20px; height: 20px;
    color: var(--brass-deep);
    margin-top: 2px;
    flex-shrink: 0;
  }
  .loc-text strong {
    display: block;
    color: var(--ink);
    font-weight: 700;
    margin-bottom: 6px;
    font-size: 16px;
  }
  .loc-text span {
    display: block;
    color: var(--ink-mute);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ============ Registration form ============ */
  .register {
    background: var(--forest);
    color: var(--paper);
    padding: 112px 0;
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 720px) { .register { padding: 90px 0; } }

  .register::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at top, rgba(168, 120, 63, 0.20), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(168, 120, 63, 0.10), transparent 60%);
    pointer-events: none;
  }

  .register-inner {
    position: relative; z-index: 2;
    max-width: 740px;
    margin: 0 auto;
    padding: 0 30px;
  }

  .register-head {
    text-align: center;
    margin-bottom: 56px;
  }
  .register-head .tag {
    display: inline-block;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.46em;
    color: var(--brass-bright);
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .register-head h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(32px, 5vw, 60px);
    line-height: 1.12;
    color: var(--paper);
    letter-spacing: -0.025em;
  }
  .register-head h2 em {
    color: var(--brass-bright);
    font-style: normal;
    font-weight: 500;
  }
  .register-head p {
    margin-top: 22px;
    font-size: 16px;
    color: rgba(250, 245, 232, 0.78);
    line-height: 1.75;
  }
  .register-head .register-eligibility {
    margin-top: 16px;
    font-size: 17px;
    font-weight: 700;
    color: var(--gold-bright);
    letter-spacing: 0.01em;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
  }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  /* Mobile input UX: 16px prevents iOS auto-zoom on focus; larger tap targets */
  @media (max-width: 640px) {
    .field input, .field select, .field textarea { font-size: 16px; padding: 16px 18px; }
    .field select { background-position: left 16px center; }
    .form-submit { padding: 18px 28px; }
  }

  .field { display: flex; flex-direction: column; }
  .field.full { grid-column: 1 / -1; }

  .field label {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--brass-bright);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .field label .req { color: var(--brass-bright); opacity: 0.7; }

  .field input, .field select, .field textarea {
    width: 100%;
    padding: 15px 20px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(201, 158, 94, 0.32);
    color: var(--paper);
    font-family: var(--sans);
    font-size: 15.5px;
    font-weight: 400;
    border-radius: 2px;
    transition: border-color 0.3s, background 0.3s;
    direction: rtl;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--brass-bright);
    background: rgba(255, 255, 255, 0.07);
  }
  .field input::placeholder, .field textarea::placeholder {
    color: rgba(250, 245, 232, 0.32);
  }
  .field select {
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23C99E5E' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: left 20px center;
    background-size: 12px;
    padding-left: 44px;
  }
  .field textarea { resize: vertical; min-height: 100px; font-family: var(--sans); }
  /* Dropdown options — readable dark text on white when the native list opens */
  .field select option {
    color: #16352A;
    background: #FFFFFF;
    font-weight: 500;
  }
  .field select option:disabled { color: #9AA39B; }

  .form-submit {
    margin-top: 30px;
    width: 100%;
    padding: 20px 40px;
    background: var(--brass);
    border: 1px solid var(--brass);
    color: var(--night);
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.35s cubic-bezier(.2,.7,.3,1);
    display: inline-flex; align-items: center; justify-content: center;
    gap: 14px;
    position: relative; overflow: hidden;
  }
  .form-submit::after {
    content: ''; position: absolute; inset: 0;
    background: var(--brass-bright);
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(.2,.7,.3,1);
    z-index: -1;
  }
  .form-submit:hover { border-color: var(--brass-bright); }
  .form-submit:hover::after { transform: translateX(0); }
  .form-submit:disabled { opacity: 0.6; cursor: wait; }
  .form-submit svg { width: 16px; height: 16px; }

  .form-note {
    margin-top: 24px;
    font-size: 13px;
    color: rgba(250, 245, 232, 0.62);
    line-height: 1.7;
    text-align: center;
  }

  /* Donation / seriousness deposit callout */
  .donation-note {
    margin: 30px 0 4px;
    padding: 26px 30px;
    background: rgba(194, 162, 76, 0.16);
    border: 1.5px solid rgba(194, 162, 76, 0.55);
    border-radius: 8px;
    text-align: center;
    font-size: 16.5px;
    font-weight: 500;
    line-height: 1.8;
    color: var(--paper);
    box-shadow: 0 6px 24px rgba(194,162,76,0.14);
  }
  .donation-note .amount {
    font-weight: 700;
    color: var(--gold-bright);
    white-space: nowrap;
  }
  .donation-note strong { color: var(--gold-bright); font-weight: 700; }
  .donation-note .heart { color: var(--gold-bright); }

  /* Success */
  .success {
    display: none;
    text-align: center;
    padding: 56px 32px;
    border: 1px solid var(--brass-bright);
    background: rgba(201, 158, 94, 0.06);
    border-radius: 4px;
  }
  .success.visible { display: block; animation: fadeIn 0.6s; }
  .success-icon {
    width: 64px; height: 64px;
    margin: 0 auto 26px;
    border: 1.5px solid var(--brass-bright);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .success-icon svg { width: 28px; height: 28px; color: var(--brass-bright); }
  .success h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 28px;
    color: var(--paper);
    margin-bottom: 16px;
    letter-spacing: -0.015em;
  }
  .success p {
    font-size: 15px;
    color: rgba(250, 245, 232, 0.78);
    line-height: 1.75;
    max-width: 440px;
    margin: 0 auto;
  }
  form.hidden { display: none; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ============ Footer ============ */
  footer {
    background: var(--paper);
    padding: 60px 0 40px;
    text-align: center;
  }
  .footer-mark img { height: 66px; margin-bottom: 22px; }
  .footer-line {
    font-family: var(--serif);
    font-style: normal;
    font-size: 17px;
    color: var(--ink-soft);
    margin-bottom: 28px;
    font-weight: 400;
  }
  .footer-contact {
    font-size: 14px;
    color: var(--ink-mute);
    line-height: 1.85;
  }
  .footer-contact a {
    color: var(--brass-deep);
    text-decoration: none;
    font-weight: 600;
  }
  .footer-contact a:hover { color: var(--ink); }

  /* ============ Animations ============ */
  .fade {
    opacity: 0; transform: translateY(28px);
    transition: opacity 1.1s cubic-bezier(.2,.7,.3,1), transform 1.1s cubic-bezier(.2,.7,.3,1);
  }
  .fade.in { opacity: 1; transform: translateY(0); }

  /* Hero entrance */
  .hero-inner > * {
    opacity: 0; transform: translateY(20px);
    animation: heroIn 1.2s cubic-bezier(.2,.7,.3,1) forwards;
  }
  .hero-inner > *:nth-child(1) { animation-delay: 0.1s; }
  .hero-inner > *:nth-child(2) { animation-delay: 0.25s; }
  .hero-inner > *:nth-child(3) { animation-delay: 0.40s; }
  .hero-inner > *:nth-child(4) { animation-delay: 0.55s; }
  .hero-inner > *:nth-child(5) { animation-delay: 0.70s; }
  .hero-inner > *:nth-child(6) { animation-delay: 0.85s; }
  .hero-inner > *:nth-child(7) { animation-delay: 1.00s; }
  @keyframes heroIn { to { opacity: 1; transform: translateY(0); } }

  /* Italic emphasis breathing room (Hebrew italics lean and collide) */
  em {
    font-style: normal;
    font-weight: 700;
    padding: 0 0.10em;
  }

  /* ====================== MOTION & POLISH LAYER ====================== */

  /* Staggered reveal for grids */
  .stagger > * { opacity: 0; transform: translateY(28px); }
  .stagger.in > * { animation: riseIn 0.75s cubic-bezier(.2,.7,.3,1) forwards; }
  .stagger.in > *:nth-child(1) { animation-delay: 0.00s; }
  .stagger.in > *:nth-child(2) { animation-delay: 0.08s; }
  .stagger.in > *:nth-child(3) { animation-delay: 0.16s; }
  .stagger.in > *:nth-child(4) { animation-delay: 0.24s; }
  .stagger.in > *:nth-child(5) { animation-delay: 0.32s; }
  .stagger.in > *:nth-child(6) { animation-delay: 0.40s; }
  .stagger.in > *:nth-child(7) { animation-delay: 0.48s; }
  .stagger.in > *:nth-child(8) { animation-delay: 0.56s; }
  @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

  /* Section title — animated gold underline draw */
  .sect-title h2 { position: relative; display: inline-block; }
  .sect-title h2::after {
    content: ''; position: absolute; bottom: -18px; left: 50%;
    width: 70px; height: 2px; background: var(--gold);
    transform: translateX(-50%) scaleX(0); transform-origin: center;
    transition: transform 0.9s cubic-bezier(.2,.7,.3,1) 0.35s;
  }
  .sect-title.in h2::after { transform: translateX(-50%) scaleX(1); }

  /* Topics — hover lift + numeral animation */
  .topic { transition: transform 0.45s cubic-bezier(.2,.7,.3,1); }
  .topic-num { transition: color 0.5s, transform 0.5s cubic-bezier(.2,.7,.3,1); }
  .topic-title { transition: color 0.4s; }
  .topic:hover { transform: translateY(-6px); }
  .topic:hover .topic-num { color: var(--gold-bright); transform: scale(1.12); }
  .topic:hover .topic-title { color: var(--forest); }

  /* Cards — hover lift + accent grow */
  .card { transition: transform 0.45s cubic-bezier(.2,.7,.3,1), box-shadow 0.45s; }
  .card::before { transition: width 0.5s cubic-bezier(.2,.7,.3,1); }
  .card:hover { transform: translateY(-6px); box-shadow: 0 22px 55px rgba(22,53,42,0.12); }
  .card:hover::before { width: 130px; }

  /* Speaker — name underline on hover */
  .speaker-name { position: relative; display: inline-block; }
  .speaker-photo { transition: transform 0.5s cubic-bezier(.2,.7,.3,1); }
  .speaker:hover .speaker-photo { transform: translateY(-5px); }

  /* Hero arch — slow breathing animation */
  .hero-arch { animation: breathe 9s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.08; }
    50%      { transform: translate(-50%, -50%) scale(1.06); opacity: 0.14; }
  }


  /* Decorative section divider ornament */
  .ornament-divider {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    padding: 0; margin: 0 auto; max-width: 200px;
  }
  .ornament-divider::before, .ornament-divider::after {
    content: ''; height: 1px; width: 60px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .ornament-divider::after { background: linear-gradient(90deg, var(--gold), transparent); }
  .ornament-divider .diamond {
    width: 7px; height: 7px; background: var(--gold);
    transform: rotate(45deg); flex-shrink: 0;
  }

  /* CTA: entrance (heroIn) + gentle pulse — combined so it never stays hidden */
  .hero-cta {
    animation:
      heroIn 1.2s cubic-bezier(.2,.7,.3,1) 0.85s forwards,
      ctaPulse 3.5s ease-in-out 3s infinite;
  }
  @keyframes ctaPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(194,162,76,0); }
    50% { box-shadow: 0 0 0 8px rgba(194,162,76,0.10); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    /* Safety: never leave animated elements hidden when motion is reduced */
    .hero-inner > *, .stagger > * { opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
